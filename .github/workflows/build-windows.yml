name: Build Windows codex-relay

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust MSVC
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Show toolchain
        shell: pwsh
        run: |
          rustc -Vv
          cargo -V
          where.exe link

      - name: Build release
        shell: pwsh
        run: |
          cargo build --release --target x86_64-pc-windows-msvc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-relay-windows-msvc
          path: target/x86_64-pc-windows-msvc/release/codex-relay.exe
